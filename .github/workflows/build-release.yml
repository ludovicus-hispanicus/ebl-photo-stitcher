name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v2.0-rc.2)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy imageio rawpy piexif pyexiv2
          pip install cairosvg cairocffi tinycss2 cssselect2 defusedxml webencodings
          pip install rembg onnxruntime
          pip install Pillow scikit-image scipy
          pip install tqdm requests
          pip install pandas openpyxl
          pip install pillow-heif

      - name: Build Windows exe
        run: python -m PyInstaller eBL_Photo_Stitcher.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "dist/eBL Photo Stitcher.exe"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          brew install cairo libffi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy imageio rawpy piexif pyexiv2
          pip install cairosvg cairocffi tinycss2 cssselect2 defusedxml webencodings
          pip install rembg onnxruntime
          pip install Pillow scikit-image scipy
          pip install tqdm requests
          pip install pandas openpyxl
          pip install pillow-heif

      - name: Build macOS app
        run: python -m PyInstaller eBL_Photo_Stitcher_MacOS.spec --noconfirm

      - name: Create DMG
        run: |
          # Simple DMG creation
          hdiutil create -volname "eBL Photo Stitcher" \
            -srcfolder "dist/eBL Photo Stitcher.app" \
            -ov -format UDZO \
            "dist/eBL_Photo_Stitcher_macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "dist/eBL_Photo_Stitcher_macOS.dmg"

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "eBL Photo Stitcher ${{ steps.tag.outputs.tag }}"
          prerelease: ${{ contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            dist/eBL Photo Stitcher.exe
            dist/eBL_Photo_Stitcher_macOS.dmg
          body: |
            ## eBL Photo Stitcher ${{ steps.tag.outputs.tag }}

            ### Downloads
            - **Windows**: `eBL Photo Stitcher.exe` (portable, no installation needed)
            - **macOS**: `eBL_Photo_Stitcher_macOS.dmg` (drag to Applications)

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}) for details.
