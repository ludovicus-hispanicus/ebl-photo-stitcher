name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v2.0-rc.2)'
        required: true

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy imageio rawpy piexif pyexiv2
          pip install cairosvg cairocffi tinycss2 cssselect2 defusedxml webencodings
          pip install rembg onnxruntime
          pip install Pillow scikit-image scipy
          pip install tqdm requests
          pip install pandas openpyxl
          pip install pillow-heif

      - name: Build Windows exe
        run: python -m PyInstaller eBL_Photo_Stitcher.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "dist/eBL Photo Stitcher.exe"

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: brew install cairo libffi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy imageio rawpy piexif pyexiv2
          pip install cairosvg cairocffi tinycss2 cssselect2 defusedxml webencodings
          pip install rembg onnxruntime
          pip install Pillow scikit-image scipy
          pip install tqdm requests
          pip install pandas openpyxl
          pip install pillow-heif

      - name: Build macOS app
        run: python -m PyInstaller eBL_Photo_Stitcher_MacOS.spec --noconfirm

      - name: Ad-hoc codesign
        run: |
          codesign --remove-signature "dist/eBL Photo Stitcher.app" 2>/dev/null || true
          codesign --force --deep --sign - "dist/eBL Photo Stitcher.app"
          codesign --verify --verbose "dist/eBL Photo Stitcher.app" || echo "Warning: signature verification failed"

      - name: Create DMG
        run: |
          hdiutil create -volname "eBL Photo Stitcher" \
            -srcfolder "dist/eBL Photo Stitcher.app" \
            -ov -format UDZO \
            "dist/eBL_Photo_Stitcher_macOS_arm64.dmg"

      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: "dist/eBL_Photo_Stitcher_macOS_arm64.dmg"

  build-macos-intel:
    runs-on: macos-13
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: brew install cairo libffi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy imageio rawpy piexif pyexiv2
          pip install cairosvg cairocffi tinycss2 cssselect2 defusedxml webencodings
          pip install rembg onnxruntime
          pip install Pillow scikit-image scipy
          pip install tqdm requests
          pip install pandas openpyxl
          pip install pillow-heif

      - name: Build macOS app
        run: python -m PyInstaller eBL_Photo_Stitcher_MacOS.spec --noconfirm

      - name: Ad-hoc codesign
        run: |
          codesign --remove-signature "dist/eBL Photo Stitcher.app" 2>/dev/null || true
          codesign --force --deep --sign - "dist/eBL Photo Stitcher.app"
          codesign --verify --verbose "dist/eBL Photo Stitcher.app" || echo "Warning: signature verification failed"

      - name: Create DMG
        run: |
          hdiutil create -volname "eBL Photo Stitcher" \
            -srcfolder "dist/eBL Photo Stitcher.app" \
            -ov -format UDZO \
            "dist/eBL_Photo_Stitcher_macOS_intel.dmg"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-dmg
          path: "dist/eBL_Photo_Stitcher_macOS_intel.dmg"

  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm-dmg
          path: dist/

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-dmg
          path: dist/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "eBL Photo Stitcher ${{ steps.tag.outputs.tag }}"
          prerelease: ${{ contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            dist/eBL Photo Stitcher.exe
            dist/eBL_Photo_Stitcher_macOS_arm64.dmg
            dist/eBL_Photo_Stitcher_macOS_intel.dmg
          body: |
            ## eBL Photo Stitcher ${{ steps.tag.outputs.tag }}

            ### Downloads
            - **Windows**: `eBL Photo Stitcher.exe` (portable, no installation needed)
            - **macOS (Apple Silicon M1/M2/M3)**: `eBL_Photo_Stitcher_macOS_arm64.dmg`
            - **macOS (Intel)**: `eBL_Photo_Stitcher_macOS_intel.dmg`

            First run requires internet to download the AI model (~176MB).

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}) for details.
